<!DOCTYPE html>

<head>

<body>

  <header id="global-header" class="site-header"></header>

  <main class="main-content">
    <section class="page-section">
      <h1>Writing</h1>
      <p>Notes on things I am building, reading, or thinking through. No particular schedule.</p>

      <!-- No posts yet. Placeholder cards are commented out below as templates. -->

      <!--
      HOW TO ADD A BLOG POST:
      1. Copy blog/first-post.html and rename it in the blog/ folder
      2. Uncomment and fill in the card below
      3. Add the new post at the TOP of this list (newest first)
      4. Add a matching <item> to feed.xml
      5. Update sitemap.xml

      <div class="item-card">
        <div class="item-header">
          <h3><a href="blog/your-post-slug.html" class="text-link">Your Post Title Here</a></h3>
          <span class="item-meta">Month DD, YYYY</span>
        </div>
        <p>A one or two sentence summary of what the post is about. Keep it honest and direct.</p>
      </div>
      -->

      <!--
      HOW TO ADD A CODE SNIPPET IN A BLOG POST:
      Use a <pre><code class="language-go"> block inside the blog HTML file.
      The language class activates Prism.js syntax highlighting.
      See blog/first-post.html for a working example.

      <pre><code class="language-go">func main() {
          fmt.Println("hello")
      }</code></pre>
      -->

    </section>
  </main>

  <footer id="global-footer" class="site-footer"></footer>
  <script src="assets/js/main.js"></script>
</body>
